<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JMARX TRAVEL CONSULTANCY</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <img src="/assets/images/logo.png" alt="logo" class="applogo">
        </div>
        <div class="nav">
            <a href="">Home</a>
            <a href="">Place</a>
            <a href="">Offers</a>
            <a href="">Meeting & Events</a>
        </div>
        <div class="userutil">
            <div class="util">
                <img src="/assets/images/question.png" alt="" class="utilimg">
                <p>Help</p>
            </div>
            <div class="util">
                <p>English</p>
            </div>
            <div class="util">
                <img src="/assets/images/bag.png" alt="" class="utilimg">
                <p>My Trips</p>
            </div>
            <button class="signin">Sign In</button>
        </div>
    </header>
    <main>
        <section class="hero">
            <h1>UNCOVER HIDDEN GEMS,<br> CREATE LIFE-CHANGING MEMORIES</h1>
            <button class="discover-btn">DISCOVER</button>
        </section>

        <section class="travel">
            <div class="loc-btn">
                <img src="/assets/images/location_on.png" alt="">
                <p>Origin</p>
            </div>
            <img src="/assets/images/arrow.png" alt="">
            <div class="loc-btn">
                <img src="/assets/images/location_on.png">
                <p>Destination</p>
            </div>
            <div class="travel-btn">
                <p>Travel</p>
                <img src="/assets/images/plane-white.png" alt="" class="paperplane-img">
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
